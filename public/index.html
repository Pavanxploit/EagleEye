<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="/manifest.json">
<title>Bike Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
  body{background:#0f172a;color:#f1f5f9;height:100vh;display:flex;flex-direction:column}
  #topbar{padding:10px 14px;background:#1e293b;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;align-items:center;min-width:60px}
  .stat-val{font-size:16px;font-weight:600}
  .stat-lbl{font-size:10px;color:#94a3b8;margin-top:1px}
  #fall-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .standing{background:#064e3b;color:#34d399}
  .fallen{background:#7f1d1d;color:#fca5a5;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  #map{flex:1;z-index:0}
  #bottombar{background:#1e293b;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap}
  button{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
  #btn-kill{background:#dc2626;color:#fff}
  #btn-restore{background:#16a34a;color:#fff}
  #btn-history{background:#1e40af;color:#fff}
  #btn-fence{background:#7c3aed;color:#fff}
  button:active{transform:scale(.97)}
  #alert-bar{display:none;background:#7f1d1d;color:#fca5a5;padding:8px 14px;font-size:12px;border-left:3px solid #ef4444}
  #last-update{font-size:10px;color:#94a3b8;padding:4px 14px;background:#0f172a;text-align:right}
</style>
</head><body>

<div id="topbar">
  <div class="stat"><span class="stat-val" id="spd">0</span><span class="stat-lbl">km/h</span></div>
  <div id="fall-chip" class="standing">Standing</div>
  <div class="stat"><span class="stat-val" id="sats">0</span><span class="stat-lbl">satellites</span></div>
  <div class="stat"><span class="stat-val" id="tilt">0°</span><span class="stat-lbl">tilt</span></div>
</div>

<div id="alert-bar" id="abar"></div>
<div id="map"></div>
<div id="last-update">waiting for device...</div>

<div id="bottombar">
  <button id="btn-kill"   onclick="sendCmd('KILL')">Kill Engine</button>
  <button id="btn-restore" onclick="sendCmd('RESTORE')">Restore</button>
  <button id="btn-history" onclick="loadHistory()">Trip History</button>
  <button id="btn-fence"   onclick="setFenceMode()">Set Geofence</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DEVICE = 'BIKE_001';
const map = L.map('map').setView([12.31,76.65],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {attribution:'OpenStreetMap'}).addTo(map);

const bikeIcon = L.divIcon({
  html:'<div style="width:16px;height:16px;background:#3b82f6;border:2px solid #fff;border-radius:50%"></div>',
  iconSize:[16,16],iconAnchor:[8,8]
});
const marker = L.marker([12.31,76.65],{icon:bikeIcon}).addTo(map);
let historyLine = null;
let fenceCircle = null;
let fenceMode   = false;
let lastFallen  = false;

async function refresh(){
  try{
    const r = await fetch(`/api/live/${DEVICE}`);
    const d = await r.json();
    if(!d) return;
    marker.setLatLng([d.lat,d.lng]);
    map.panTo([d.lat,d.lng]);
    document.getElementById('spd').textContent = Math.round(d.speed||0);
    document.getElementById('sats').textContent = d.satellites||0;
    document.getElementById('tilt').textContent = Math.round(Math.max(Math.abs(d.tiltX||0),Math.abs(d.tiltY||0)))+'°';
    const chip = document.getElementById('fall-chip');
    const ab = document.getElementById('alert-bar');
    if(d.fallen){
      chip.textContent='FALLEN!'; chip.className='fallen';
      if(!lastFallen){ ab.style.display='block'; ab.textContent='Alert: Vehicle fallen at '+new Date(d.ts).toLocaleTimeString(); }
    } else {
      chip.textContent='Standing'; chip.className='standing'; ab.style.display='none';
    }
    lastFallen = d.fallen;
    document.getElementById('last-update').textContent = 'Last update: '+new Date(d.ts).toLocaleTimeString();
  }catch(e){console.error(e)}
}

async function sendCmd(cmd){
  if(!confirm(`Send "${cmd}" command to bike?`)) return;
  await fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deviceId:DEVICE,cmd})});
  alert(`Command sent. Device responds in ~10 seconds.`);
}

async function loadHistory(){
  const r = await fetch(`/api/history/${DEVICE}`);
  const pts = await r.json();
  if(historyLine) map.removeLayer(historyLine);
  historyLine = L.polyline(pts.map(p=>[p.lat,p.lng]),{color:'#3b82f6',weight:2,opacity:.7}).addTo(map);
  map.fitBounds(historyLine.getBounds());
}

function setFenceMode(){
  fenceMode=true;
  alert('Tap on the map to set geofence center');
}

map.on('click', async e => {
  if(!fenceMode) return;
  const {lat,lng} = e.latlng;
  const radius = parseInt(prompt('Radius in metres? (e.g. 200)','200'));
  if(!radius) return;
  if(fenceCircle) map.removeLayer(fenceCircle);
  fenceCircle = L.circle([lat,lng],{radius,color:'#3b82f6',fillOpacity:.08}).addTo(map);
  await fetch('/api/geofence',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deviceId:DEVICE,lat,lng,radius})});
  fenceMode=false;
  alert('Geofence saved!');
});

setInterval(refresh,5000);
refresh();
</script>
</body></html>
